openapi: 3.0.3
info:
  title: Restaurant Booking API
  version: 1.0.0

servers:
  - url: http://localhost:8080/api

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: string
      example: "Not Found"

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        full_name:
          type: string
        phone:
          type: string
      required:
        - email
        - password
        - full_name
        - phone

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - email
        - full_name
        - phone
        - created_at
        - updated_at

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
        - token
        - user

    MeResponse:
      type: object
      properties:
        User:
          $ref: '#/components/schemas/User'
      required:
        - User

    Restaurant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        city:
          type: string
        address:
          type: string
        cuisine_type:
          type: string
          enum:
            - italian
            - japanese
            - georgian
            - russian
            - american
            - mexican
            - chinese
            - thai
            - indian
            - european
            - mediterranean
            - other
        price_category:
          type: string
          enum:
            - low
            - medium
            - high
        photos:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - city
        - address
        - cuisine_type
        - price_category
        - photos
        - created_at

    RestaurantListResponse:
      type: object
      properties:
        restaurants:
          type: array
          items:
            $ref: '#/components/schemas/Restaurant'
      required:
        - restaurants

    RestaurantDetailResponse:
      type: object
      properties:
        restaurant:
          $ref: '#/components/schemas/Restaurant'
      required:
        - restaurant

    Dish:
      type: object
      properties:
        id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        is_available:
          type: boolean
        proteins:
          type: number
          format: double
        fats:
          type: number
          format: double
        carbs:
          type: number
          format: double
        price:
          type: number
          format: double
        category:
          type: string
      required:
        - id
        - restaurant_id
        - name
        - description
        - is_available
        - price
        - category

    MenuListResponse:
      type: object
      properties:
        Items:
          type: array
          items:
            $ref: '#/components/schemas/Dish'
      required:
        - Items

    ReviewItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
        created_at:
          type: string
          format: date-time
        author_name:
          type: string
      required:
        - id
        - rating
        - text
        - created_at
        - author_name

    ReviewListResponse:
      type: object
      properties:
        Items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewItem'
      required:
        - Items

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        text:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - restaurant_id
        - text
        - rating
        - created_at
        - updated_at

    CreateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
      required:
        - rating
        - text

    ReviewResponse:
      type: object
      properties:
        Review:
          $ref: '#/components/schemas/Review'
      required:
        - Review

    ReviewGetItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        author_name:
          type: string
      required:
        - id
        - rating
        - text
        - created_at
        - updated_at
        - author_name

    ReviewGetResponse:
      type: object
      properties:
        Item:
          $ref: '#/components/schemas/ReviewGetItem'
      required:
        - Item

    Table:
      type: object
      properties:
        id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        table_number:
          type: integer
        seats_count:
          type: integer
      required:
        - id
        - restaurant_id
        - table_number
        - seats_count

    TableListResponse:
      type: object
      properties:
        Items:
          type: array
          items:
            $ref: '#/components/schemas/Table'
      required:
        - Items

    AvailabilityResponse:
      type: object
      properties:
        Available:
          type: boolean
      required:
        - Available

    CreateBookingRequest:
      type: object
      properties:
        restaurant_id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
        booking_date:
          type: string
          format: date
          example: "2026-05-01"
        start_time:
          type: string
          example: "18:00"
        end_time:
          type: string
          example: "20:00"
        guests_count:
          type: integer
          minimum: 1
      required:
        - restaurant_id
        - table_id
        - booking_date
        - start_time
        - end_time
        - guests_count

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
        guests_count:
          type: integer
        booking_date:
          type: string
          format: date
        start_time:
          type: string
          example: "18:00"
        end_time:
          type: string
          example: "20:00"
        status:
          type: string
          enum:
            - pending
            - confirmed
            - cancelled
            - completed
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - restaurant_id
        - table_id
        - guests_count
        - booking_date
        - start_time
        - end_time
        - status
        - created_at
        - updated_at

    BookingResponse:
      type: object
      properties:
        Booking:
          $ref: '#/components/schemas/Booking'
      required:
        - Booking

    BookingListResponse:
      type: object
      properties:
        Bookings:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
      required:
        - Bookings

    CancelBookingResponse:
      type: object
      properties:
        OK:
          type: boolean
      required:
        - OK

    RestaurantDeleteResponse:
      type: object
      properties:
        restaurant:
          $ref: '#/components/schemas/Restaurant'
      required:
        - restaurant

  responses:
    PlainError:
      description: Ошибка
      content:
        text/plain:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/PlainError'
        '409':
          $ref: '#/components/responses/PlainError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/PlainError'
        '401':
          $ref: '#/components/responses/PlainError'

  /auth/me:
    get:
      tags:
        - Auth
      summary: Профиль текущего пользователя
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Данные профиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/PlainError'

  /restaurants:
    get:
      tags:
        - Restaurants
      summary: Список ресторанов с фильтрацией
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: cuisine_type
          in: query
          schema:
            type: string
        - name: price_category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Список ресторанов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantListResponse'

  /restaurants/{id}:
    get:
      tags:
        - Restaurants
      summary: Детальная информация о ресторане
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация о ресторане
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDetailResponse'
        '404':
          $ref: '#/components/responses/PlainError'
    delete:
      tags:
        - Restaurants
      summary: Удалить ресторан
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ресторан удалён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantDeleteResponse'
        '401':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'

  /restaurants/{id}/menu:
    get:
      tags:
        - Restaurants
      summary: Меню ресторана
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список позиций меню
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuListResponse'
        '404':
          $ref: '#/components/responses/PlainError'

  /restaurants/{id}/reviews:
    get:
      tags:
        - Reviews
      summary: Отзывы о ресторане
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список отзывов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '404':
          $ref: '#/components/responses/PlainError'
    post:
      tags:
        - Reviews
      summary: Оставить отзыв о ресторане
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Отзыв создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          $ref: '#/components/responses/PlainError'
        '401':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'
        '409':
          $ref: '#/components/responses/PlainError'

  /restaurants/{id}/reviews/{reviewID}:
    get:
      tags:
        - Reviews
      summary: Получить отзыв
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: reviewID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Отзыв
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewGetResponse'
        '404':
          $ref: '#/components/responses/PlainError'
    put:
      tags:
        - Reviews
      summary: Обновить отзыв
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: reviewID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '200':
          description: Отзыв обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          $ref: '#/components/responses/PlainError'
        '401':
          $ref: '#/components/responses/PlainError'
        '403':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'
    delete:
      tags:
        - Reviews
      summary: Удалить отзыв
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: reviewID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Отзыв удалён
        '401':
          $ref: '#/components/responses/PlainError'
        '403':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'

  /restaurants/{id}/tables:
    get:
      tags:
        - Restaurants
      summary: Список столиков ресторана
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список столиков
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableListResponse'
        '404':
          $ref: '#/components/responses/PlainError'

  /restaurants/{id}/tables/{tableID}/availability:
    get:
      tags:
        - Bookings
      summary: Проверка доступности столика на интервал
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: booking_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: start_time
          in: query
          required: true
          schema:
            type: string
            example: "18:00"
        - name: end_time
          in: query
          required: true
          schema:
            type: string
            example: "20:00"
      responses:
        '200':
          description: Статус доступности
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'

  /bookings:
    post:
      tags:
        - Bookings
      summary: Создать бронирование
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Бронирование создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/PlainError'
        '401':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'
        '409':
          $ref: '#/components/responses/PlainError'

  /me/bookings:
    get:
      tags:
        - Bookings
      summary: История бронирований текущего пользователя
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список бронирований
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        '401':
          $ref: '#/components/responses/PlainError'

  /me/bookings/{bookingID}:
    get:
      tags:
        - Bookings
      summary: Детали бронирования
      security:
        - BearerAuth: []
      parameters:
        - name: bookingID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация о бронировании
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '401':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'
    delete:
      tags:
        - Bookings
      summary: Отмена бронирования
      security:
        - BearerAuth: []
      parameters:
        - name: bookingID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Бронирование отменено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelBookingResponse'
        '401':
          $ref: '#/components/responses/PlainError'
        '404':
          $ref: '#/components/responses/PlainError'
